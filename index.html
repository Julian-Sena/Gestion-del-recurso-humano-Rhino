<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - Rhino</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contenedor-principal">

        <div class="mitad-izquierda">
            <img src="Logo.png" alt="Logo de la empresa" class="logo">
            <p class="texto-personal">
                En este portal usted podrá iniciar sesión para consultar todos sus respectivos datos como parte del personal de Rhino.
            </p>
        </div>

        <div class="mitad-derecha">

            <div class="tab-bar">
                <button class="tab-btn activo" onclick="abrirTab(event, 'tab-empleado')">Empleado</button>
                <button class="tab-btn" onclick="abrirTab(event, 'tab-analista')">Analista</button>
                <button class="tab-btn" onclick="abrirTab(event, 'tab-supervisor')">Supervisor</button>
                <button class="tab-btn" onclick="abrirTab(event, 'tab-gerente')">Gerente general</button>
            </div>

            <div class="seccion-login">
                <div id="tab-empleado" class="contenido-tab en-pantalla">
                    <h2>Ingreso: Empleado</h2>
                    <input type="text" id="input-user-empleado" placeholder="Usuario">
                    <input type="password" id="input-pass-empleado" placeholder="Contraseña">
                    <button class="btn-login" onclick="validarLogin('empleado')">Iniciar sesión</button>
                    <p id="error-empleado" class="mensaje-error"></p>
                </div>

                <div id="tab-analista" class="contenido-tab">
                    <h2>Ingreso: Analista</h2>
                    <input type="text" id="input-user-analista" placeholder="Usuario">
                    <input type="password" id="input-pass-analista" placeholder="Contraseña">
                    <button class="btn-login" onclick="validarLogin('analista')">Iniciar sesión</button>
                    <p id="error-analista" class="mensaje-error"></p>
                </div>

                <div id="tab-supervisor" class="contenido-tab">
                    <h2>Ingreso: Supervisor</h2>
                    <input type="text" id="input-user-supervisor" placeholder="Usuario">
                    <input type="password" id="input-pass-supervisor" placeholder="Contraseña">
                    <button class="btn-login" onclick="validarLogin('supervisor')">Iniciar sesión</button>
                    <p id="error-supervisor" class="mensaje-error"></p>
                </div>

                <div id="tab-gerente" class="contenido-tab">
                    <h2>Ingreso: Gerente General</h2>
                    <input type="text" id="input-user-gerente" placeholder="Usuario">
                    <input type="password" id="input-pass-gerente" placeholder="Contraseña">
                    <button class="btn-login" onclick="validarLogin('gerente')">Iniciar sesión</button>
                    <p id="error-gerente" class="mensaje-error"></p>
                </div>
            </div>

            <a href="https://rhinosas.com.co" class="link-quienes-somos">¿Quienes somos?</a>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
